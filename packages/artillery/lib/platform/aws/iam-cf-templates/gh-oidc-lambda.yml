AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IAM Role for Artillery.io Lambda with attached policies

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "GitHub"
        Parameters:
          - GitHubRepository
          - GitHubBranch
      - Label:
          default: "AWS IAM"
        Parameters:
          - GitHubOIDCProviderArn
    ParameterLabels:
      GitHubRepository:
        default: "GitHub repository"
      GitHubBranch:
        default: "GitHub branch"
      GitHubOIDCProviderArn:
        default: "GitHub OIDC identity provider ARN"

Parameters:
  GitHubRepository:
    Type: String
    Default: ""
    Description: Use when you want to restrict a specific GitHub repository (orgname/reponame) to assume this IAM role using OIDC (e.g. "artilleryio/artillery").

  GitHubBranch:
    Type: String
    Default: "*"
    Description: (Optional) Use when you also want to restrict a branch within a specific Github repository to assume this IAM role using OIDC (e.g. "main"). If not set, defaults to "*" (all branches). 

  GitHubOIDCProviderArn:
    Type: String
    Default: ""
    Description: The ARN of the existing GitHub OIDC identity provider. Leave empty if none exists, and one will be created.

Conditions:
  IsGHRepoSet:
    !Not [!Equals [!Ref GitHubRepository, ""]]

  CreateOIDCProvider:
    !Equals [!Ref GitHubOIDCProviderArn, ""]


Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"
      ThumbprintList:
        - "6938fd4d98bab03faadb97b34396831e3780aea1"

  ArtilleryGitHubOIDCForLambdaRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: "ArtilleryGitHubOIDCForLambdaRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Federated: 
                Fn::If:
                  - CreateOIDCProvider
                  - !Ref GitHubOIDCProvider
                  - !Ref GitHubOIDCProviderArn
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition: {
              StringEquals:
                {
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                },
              StringLike:
                {
                  "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepository}:${GitHubBranch}"
                }
            }
      Path: "/"
      Policies:
        - PolicyName: ArtilleryDistributedTestingLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CreateOrGetLambdaRole
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/artilleryio-default-lambda-role-*"
              - Sid: CreateLambdaPolicy
                Effect: Allow
                Action:
                  - iam:CreatePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:policy/artilleryio-lambda-policy-*"
              - Sid: SQSPermissions
                Effect: Allow
                Action:
                  - sqs:*
                Resource: !Sub "arn:aws:sqs:*:${AWS::AccountId}:artilleryio*"
              - Sid: SQSListQueues
                Effect: Allow
                Action:
                  - sqs:ListQueues
                Resource: "*"
              - Sid: LambdaPermissions
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunctionConfiguration
                Resource: !Sub "arn:aws:lambda:*:${AWS::AccountId}:function:artilleryio-*"
              - Sid: EcrPullImagePermissions
                Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "arn:aws:ecr:*:248481025674:repository/artillery-worker"
              - Sid: S3Permissions
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetLifecycleConfiguration
                  - s3:PutLifecycleConfiguration
                Resource:
                  - !Sub "arn:aws:s3:::artilleryio-test-data-*"
                  - !Sub "arn:aws:s3:::artilleryio-test-data-*/*"

Outputs:
  RoleArn:
    Description: ARN of the IAM Role for Artillery.io Lambda functions
    Value: !GetAtt ArtilleryGitHubOIDCForLambdaRole.Arn
  OIDCProviderArn:
    Condition: CreateOIDCProvider
    Description: "ARN of the newly created OIDC provider"
    Value: !Ref GitHubOIDCProvider